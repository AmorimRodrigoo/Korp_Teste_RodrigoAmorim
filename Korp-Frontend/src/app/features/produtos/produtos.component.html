<div class="header" style="margin-bottom: 20px;">
  <h2>Gestão de Estoque</h2>
</div>

<div class="form-container mat-elevation-z2" style="padding: 20px; background: white; border-radius: 8px; margin-bottom: 24px;">
  <h3>Novo Produto</h3>
  <div style="display: flex; gap: 16px; align-items: center; flex-wrap: wrap;">
    
    <mat-form-field appearance="outline">
      <mat-label>Código</mat-label>
      <input matInput [(ngModel)]="novoProduto.codigo" placeholder="Ex: PROD-01">
    </mat-form-field>

    <mat-form-field appearance="outline" style="flex: 1;">
      <mat-label>Descrição</mat-label>
      <input matInput [(ngModel)]="novoProduto.descricao" placeholder="Ex: Teclado Mecânico">
    </mat-form-field>

    <mat-form-field appearance="outline" style="width: 150px;">
      <mat-label>Saldo Inicial</mat-label>
      <input matInput type="number" [(ngModel)]="novoProduto.saldo">
    </mat-form-field>

    <button mat-flat-button color="primary" style="height: 56px; margin-bottom: 22px;" (click)="salvarProduto()">
      Salvar Produto
    </button>
  </div>
</div>

@if (produtos().length > 0) {
  <div class="mat-elevation-z2">
    <table mat-table [dataSource]="produtos()" style="width: 100%;">

      <ng-container matColumnDef="codigo">
        <th mat-header-cell *matHeaderCellDef> Código </th>
        <td mat-cell *matCellDef="let p"> <strong>{{p.codigo}}</strong> </td>
      </ng-container>

      <ng-container matColumnDef="descricao">
        <th mat-header-cell *matHeaderCellDef> Descrição </th>
        <td mat-cell *matCellDef="let p"> {{p.descricao}} </td>
      </ng-container>

      <ng-container matColumnDef="saldo">
        <th mat-header-cell *matHeaderCellDef> Saldo Atual </th>
        <td mat-cell *matCellDef="let p"> 
          <span [style.color]="p.saldo === 0 ? 'red' : 'green'" style="font-weight: bold;">
            {{p.saldo}} un.
          </span>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="colunas"></tr>
      <tr mat-row *matRowDef="let row; columns: colunas;"></tr>
    </table>
  </div>
} @else {
  <div style="padding: 40px; text-align: center; color: #666; background: white; border-radius: 8px; border: 1px dashed #ccc;">
    Nenhum produto cadastrado no estoque ainda.
  </div>
}
